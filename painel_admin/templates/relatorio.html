<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório — {{ slug }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .back { display: inline-block; color: #4f46e5; text-decoration: none; font-size: 14px; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 16px; color: #333; margin-bottom: 16px; }
        .num { font-size: 48px; font-weight: bold; color: #4f46e5; }
        .conversa { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .conversa:last-child { border-bottom: none; }
        .msg-u { background: #4f46e5; color: white; padding: 8px 12px; border-radius: 8px; font-size: 13px; display: inline-block; margin-bottom: 6px; }
        .msg-b { background: #f0f0f0; color: #333; padding: 8px 12px; border-radius: 8px; font-size: 13px; display: inline-block; }
        .data { font-size: 11px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="back">← Voltar ao painel</a>
        <div class="card">
            <h2>Total de mensagens — {{ slug }}</h2>
            <div class="num">{{ total }}</div>
        </div>
        <div class="card">
            <h2>Últimas conversas</h2>
            {% if mensagens %}
                {% for msg, resp, data, hora in mensagens %}
                <div class="conversa">
                    <div class="msg-u">{{ msg }}</div><br>
                    <div class="msg-b">{{ resp }}</div>
                    <div class="data">{{ data }} às {{ hora }}</div>
                </div>
                {% endfor %}
            {% else %}
                <p style="color:#999;font-size:14px">Sem conversas ainda.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
