<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — ChatBot PG</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
        h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 14px; color: #666; margin-bottom: 24px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none; }
        input:focus { border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background: #4338ca; }
        .erro { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🤖 ChatBot PG</h1>
        <p>Painel administrativo</p>
        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="senha" placeholder="Senha de acesso" autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
