<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin — {{ loja.nome }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #2563eb, #1d4ed8); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; text-align: center; }
        h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; }
        p { font-size: 14px; color: #666; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .erro { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛍️ {{ loja.nome }}</h1>
        <p>Painel administrativo</p>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="senha" placeholder="Senha" autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
