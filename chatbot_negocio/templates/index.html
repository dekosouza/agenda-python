<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ negocio.nome }}</title>
    <style>
        :root {
            --cor: {{ negocio.cor_primaria }};
            --cor-texto: {{ negocio.cor_texto }};
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-container { width: 100%; max-width: 480px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); overflow: hidden; }
        .header { background: var(--cor); color: var(--cor-texto); padding: 16px 20px; }
        .header h1 { font-size: 18px; }
        .header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
        .online { display: inline-block; width: 8px; height: 8px; background: #25D366; border-radius: 50%; margin-right: 6px; }
        .messages { height: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .msg.bot { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .msg.user { background: var(--cor); color: var(--cor-texto); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.loading { background: white; color: #999; align-self: flex-start; font-style: italic; }
        .input-area { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; }
        input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--cor); }
        button.enviar { padding: 10px 18px; background: var(--cor); color: var(--cor-texto); border: none; border-radius: 24px; cursor: pointer; font-size: 14px; }
        button.enviar:hover { opacity: 0.9; }
        button.limpar { background: none; border: none; color: #999; font-size: 12px; cursor: pointer; padding: 4px 8px; }
        button.limpar:hover { color: #666; }
        .powered { text-align: center; font-size: 11px; color: #ccc; padding: 8px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1><span class="online"></span>{{ negocio.logo_emoji }} {{ negocio.nome }}</h1>
            <p>{{ negocio.tipo }} · Atendimento automático 24h</p>
        </div>
        <div class="messages" id="messages">
            <div class="msg bot">{{ negocio.mensagem_boas_vindas }}</div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviar()">
            <button class="enviar" onclick="enviar()">Enviar</button>
            <button class="limpar" onclick="limpar()">Limpar</button>
        </div>
        <div class="powered">Powered by ChatBot IA</div>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById("input");
            const mensagem = input.value.trim();
            if (!mensagem) return;

            adicionarMsg(mensagem, "user");
            input.value = "";

            const loading = adicionarMsg("digitando...", "loading");

            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({mensagem})
            });

            const data = await res.json();
            loading.remove();
            adicionarMsg(data.resposta, "bot");
        }

        function adicionarMsg(texto, tipo) {
            const div = document.createElement("div");
            div.className = `msg ${tipo}`;
            div.textContent = texto;
            const msgs = document.getElementById("messages");
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }

        async function limpar() {
            await fetch("/limpar", {method: "POST"});
            document.getElementById("messages").innerHTML = 
                '<div class="msg bot">{{ negocio.mensagem_boas_vindas }}</div>';
        }
    </script>
</body>
</html>
